services:
  aws-services:
    image: localstack/localstack:3.0
    container_name: aws-services
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3,sqs,dynamodb
      - DEBUG=1
      - AWS_DEFAULT_REGION=us-east-1
      - EDGE_PORT=4566
      - EXTRA_CORS_ALLOWED_ORIGINS=http://localhost:3000
      - EXTRA_CORS_ALLOWED_HEADERS=*
      - EXTRA_CORS_ALLOWED_METHODS=*
      - EXTRA_CORS_EXPOSE_HEADERS=*
      - DISABLE_CUSTOM_CORS_S3=1
    volumes:
      - "./init-aws-services.sh:/etc/localstack/init/ready.d/init-aws-services.sh"
    networks:
      - aws-network

networks:
  aws-network:
    driver: bridge