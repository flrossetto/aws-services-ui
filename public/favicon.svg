<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Fundo gradiente -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9900" />
      <stop offset="50%" stop-color="#FF9900" />
      <stop offset="100%" stop-color="#FF9900" />
    </linearGradient>
    <linearGradient id="cloudGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#232F3E" />
      <stop offset="100%" stop-color="#232F3E" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.3" />
    </filter>
  </defs>
  
  <!-- Fundo circular -->
  <circle cx="32" cy="32" r="28" fill="url(#gradient)" filter="url(#shadow)" />
  
  <!-- Nuvem AWS estilizada -->
  <path d="M20,28 Q24,20 32,20 Q40,20 44,28 Q48,28 52,32 Q48,36 44,36 Q40,44 32,44 Q24,44 20,36 Q16,36 12,32 Q16,28 20,28 Z" 
        fill="url(#cloudGradient)" 
        stroke="#FFFFFF" 
        stroke-width="1.5" />
  
  <!-- Símbolos dos serviços dentro da nuvem -->
  <!-- S3 (bucket) -->
  <rect x="22" y="26" width="8" height="6" rx="1" fill="#FFFFFF" />
  <rect x="24" y="32" width="4" height="4" rx="0.5" fill="#FFFFFF" />
  
  <!-- DynamoDB (dados) -->
  <circle cx="38" cy="28" r="2" fill="#FFFFFF" />
  <circle cx="42" cy="28" r="2" fill="#FFFFFF" />
  <circle cx="38" cy="32" r="2" fill="#FFFFFF" />
  <circle cx="42" cy="32" r="2" fill="#FFFFFF" />
  
  <!-- SQS (fila) -->
  <rect x="28" y="36" width="16" height="4" rx="0.5" fill="#FFFFFF" />
  <rect x="30" y="40" width="12" height="2" rx="0.5" fill="#FFFFFF" opacity="0.8" />
  
  <!-- Linhas de conexão -->
  <path d="M30,32 L34,32" stroke="#FFFFFF" stroke-width="1" stroke-dasharray="2,2" />
  <path d="M34,34 L38,34" stroke="#FFFFFF" stroke-width="1" stroke-dasharray="2,2" />
  
  <!-- Brilho/reflexo -->
  <circle cx="20" cy="20" r="6" fill="#FFFFFF" opacity="0.1" />
</svg>